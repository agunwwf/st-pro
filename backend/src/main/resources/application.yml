
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/apple_admin?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  servlet:
    multipart:
      # 单个文件和请求的最大体积（根据需要再调小/调大）
      max-file-size: 20MB
      max-request-size: 40MB
  sql:
    init:
      schema-locations: classpath:db/mysql_schema.sql
      mode: always

mybatis:
  configuration:

    map-underscore-to-camel-case: true

    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  tomcat:

    max-swallow-size: 20MB
    max-http-form-post-size: 40MB

