spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: https://api.deepseek.com
      chat:
        api-key: ${DEEPSEEK_API_KEY:}
        options:
          model: deepseek-chat
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:apple_admin}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 40MB
  sql:
    init:
      schema-locations: classpath:db/mysql_schema.sql
      mode: always

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  tomcat:
    max-swallow-size: 20MB
    max-http-form-post-size: 40MB

jwt:
  secret: ${JWT_SECRET:asdfgHJHJKL123@#$$%789}

logging:
  file:
    name: logs/learning-system.log